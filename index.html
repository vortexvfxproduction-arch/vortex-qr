<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-KW5XLVHTGH"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-KW5XLVHTGH', { transport_type: 'beacon' });

// قراءة UTM و QR ID
const params = new URLSearchParams(window.location.search);
const utm_source = params.get('utm_source') || 'direct';
const utm_medium = params.get('utm_medium') || 'none';
const utm_campaign = params.get('utm_campaign') || 'general';
const qr_id = params.get('qr_id') || 'default';

// تسجيل زيارة الصفحة
gtag('event', 'qr_visit', {
  qr_id: qr_id,
  campaign: utm_campaign,
  source: utm_source,
  medium: utm_medium
});

// دالة تتبع الضغط وتحويل
function trackClick(buttonName, url){
  gtag('event', buttonName + '_click', {
    qr_id: qr_id,
    campaign: utm_campaign,
    source: utm_source,
    medium: utm_medium
  });
  setTimeout(() => { window.location.href = url; }, 300);
}
</script>
